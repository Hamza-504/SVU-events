        <div class="contact py-5">

                <div class="main-title">
                    <h1>تواصل معنا واسألنا!!</h1>
                </div>
                <div class="card rounded-4 p-4 position-relative">
                    <form class="d-flex align-center justify-content-center row p-4 text-center">
                        <label class="p-0 py-2 fw-bold fs-3">الاسم</label>
                        <input type="text" class="p-3 text-center" placeholder="أدخل اسمك">
                        <label class="p-0 py-2 fw-bold fs-3">البريد الإلكتروني</label>
                        <input type="email" class="p-3 text-center"  placeholder="أدخل بريدك الإلكتروني">
                        <label class="p-0 py-2 fw-bold fs-3">الرسالة</label>
                        <textarea id="message" class="p-3 py-5 text-center d-block" placeholder="اكتب رسالتك هنا"></textarea>
                    </form>
                    <button class="send btn btn-secondary w-100 mb-4 py-3 mx-auto">إرسال</button>
                </div>
            </div>
        </div>
